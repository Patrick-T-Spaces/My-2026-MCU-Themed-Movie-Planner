<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snPG '26 Movie Tracker</title>
    <style>
        :root {
            --bg-color: #121416;
            --panel-color: #1a1d20;
            --text-primary: #ffffff;
            --text-secondary: #98a2b3;
            --arc-blue: #00d2ff;
            --arc-glow: rgba(0, 210, 255, 0.2);
            --avenger-red: #e21b22;
            --border-color: #2d3139;
            --success-green: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--arc-glow);
        }

        header {
            text-align: center;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        header h1 span {
            color: var(--arc-blue);
            text-shadow: 0 0 8px var(--arc-blue);
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Input Form Grid */
        .input-section {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1.5fr auto;
            gap: 12px;
            margin-bottom: 25px;
            align-items: end;
        }

        @media (max-width: 650px) {
            .input-section {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--arc-blue);
        }

        input, select {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--arc-blue);
            box-shadow: 0 0 5px var(--arc-blue);
        }

        button.btn-assemble {
            background-color: transparent;
            border: 1px solid var(--avenger-red);
            color: var(--avenger-red);
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 40px;
        }

        button.btn-assemble:hover {
            background-color: var(--avenger-red);
            color: white;
            box-shadow: 0 0 10px rgba(226, 27, 34, 0.5);
        }

        /* Tracker List / Table */
        .list-container {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .list-header {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1.8fr 0.4fr;
            background-color: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        @media (max-width: 500px) {
            .list-header {
                grid-template-columns: 1.5fr 1fr 1.5fr 0.4fr;
                font-size: 0.75rem;
            }
        }

        .movie-item {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1.8fr 0.4fr;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(45, 49, 57, 0.5);
            align-items: center;
            transition: background 0.2s;
        }

        @media (max-width: 500px) {
            .movie-item {
                grid-template-columns: 1.5fr 1fr 1.5fr 0.4fr;
            }
        }

        .movie-item:last-child {
            border-bottom: none;
        }

        .movie-item:hover {
            background-color: rgba(0, 210, 255, 0.02);
        }

        .movie-title {
            font-weight: 600;
            font-size: 1rem;
        }

        @media (max-width: 500px) {
            .movie-title {
                font-size: 0.85rem;
            }
        }

        .movie-date {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @media (max-width: 500px) {
            .movie-date {
                font-size: 0.8rem;
            }
        }

        /* Custom Themed Clearance Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            width: fit-content;
            letter-spacing: 0.5px;
        }

        @media (max-width: 500px) {
            .status-badge {
                font-size: 0.65rem;
                padding: 3px 6px;
            }
        }

        /* CLASS S: IMAX Paragon (Iconic Avenger Red) */
        .status-badge.priority-classS {
            background-color: rgba(226, 27, 34, 0.15);
            color: #e21b22;
            border: 1px solid #e21b22;
            text-shadow: 0 0 5px rgba(226, 27, 34, 0.3);
        }

        /* LEVEL 10: Must Watch (Loki Mischief Green) */
        .status-badge.priority-level10 {
            background-color: rgba(73, 169, 66, 0.15);
            color: #49A942;
            border: 1px solid #49A942;
            text-shadow: 0 0 4px rgba(73, 169, 66, 0.2);
        }

        /* LEVEL 5: Only If Possible (Asgardian Gold) */
        .status-badge.priority-level5 {
            background-color: rgba(226, 177, 60, 0.15);
            color: #E2B13C;
            border: 1px solid #E2B13C;
        }

        /* CLASS O: Streaming/Digital (Arc Reactor Blue) */
        .status-badge.priority-classO {
            background-color: rgba(0, 210, 255, 0.15);
            color: #00d2ff;
            border: 1px solid #00d2ff;
        }

        /* CLASS N: Own Discretion (Vibranium Slate Gray) */
        .status-badge.priority-classN {
            background-color: rgba(90, 101, 120, 0.15);
            color: #8A97A8;
            border: 1px solid #5A6578;
        }

        .action-cell {
            text-align: right;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: var(--avenger-red);
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><span>snPG '26</span> Movie Tracker</h1>
        <p>Cinematic Operations Timeline & Deployment Planner</p>
    </header>

    <!-- Interactive Custom Input Grid -->
    <div class="input-section">
        <div class="form-group">
            <label for="movieTitle">Target Intel (Movie Name)</label>
            <input type="text" id="movieTitle" placeholder="e.g., Blade">
        </div>
        <div class="form-group">
            <label for="movieDate">Deployment Date</label>
            <input type="date" id="movieDate">
        </div>
        <div class="form-group">
            <label for="moviePriority">Priority Status</label>
            <select id="moviePriority">
                <option value="IMAX Paragon/ Best System and Seat">Class S</option>
                <option value="Level 10 (Must Watch)">Level 10</option>
                <option value="Level 5 (Only if possible)">Level 5</option>
                <option value="Streaming / Digital">Class O</option>
                <option value="Own Discretion">Class N</option>
            </select>
        </div>
        <button class="btn-assemble" onclick="addMovie()">Assemble</button>
    </div>

    <!-- Main Dynamic Tracking Grid -->
    <div class="list-container">
        <div class="list-header">
            <div>Target Name</div>
            <div>Estimated Arrival</div>
            <div>Clearance / Priority</div>
            <div style="text-align: right;">Purge</div>
        </div>
        <div id="timelineList">
            <!-- Data Rows injected dynamically -->
        </div>
    </div>
</div>

<script>
    // All 12 custom movies integrated as permanent baseline items
    let watchlist = [
        { title: "Masters of the Universe", date: "2026-06-03", priority: "Level 5 (Only if possible)" },
        { title: "Disclosure Day", date: "2026-06-10", priority: "Level 10 (Must Watch)" },
        { title: "Toy Story 5", date: "2026-06-18", priority: "Level 5 (Only if possible)" },
        { title: "Supergirl", date: "2026-06-24", priority: "Level 5 (Only if possible)" },
        { title: "The Odyssey", date: "2026-07-16", priority: "Level 5 (Only if possible)" },
        { title: "Spider-Man: Brand New Day", date: "2026-07-29", priority: "IMAX Paragon/ Best System and Seat" },
        { title: "Avengers: Endgame (Re-Release)", date: "2026-09-24", priority: "Level 10 (Must Watch)" },
        { title: "Clayface", date: "2026-10-22", priority: "Level 5 (Only if possible)" },
        { title: "The Hunger Games Sunrise on the Reaping", date: "2026-11-19", priority: "Level 5 (Only if possible)" },
        { title: "Avengers: Doomsday", date: "2026-12-17", priority: "IMAX Paragon/ Best System and Seat" },
        { title: "Jumanji Open World", date: "2026-12-24", priority: "Streaming / Digital" },
        { title: "Avengers: Secret Wars", date: "2027-12-16", priority: "IMAX Paragon/ Best System and Seat" }
    ];

    // Load custom sessions local memory additions if they exist
    if (localStorage.getItem("mcuWatchlist")) {
        watchlist = JSON.parse(localStorage.getItem("mcuWatchlist"));
    }

    function saveToMemory() {
        localStorage.setItem("mcuWatchlist", JSON.stringify(watchlist));
    }

    function formatDate(dateString) {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const date = new Date(dateString);
        return isNaN(date) ? dateString : date.toLocaleDateString('en-US', options);
    }

    function renderTimeline() {
        const displayContainer = document.getElementById("timelineList");
        displayContainer.innerHTML = "";

        if (watchlist.length === 0) {
            displayContainer.innerHTML = `<div class="empty-state">No targets designated in the mainframe. Insert data above.</div>`;
            return;
        }

        // Sort timeline automatically chronologically by date
        watchlist.sort((a, b) => new Date(a.date) - new Date(b.date));

        watchlist.forEach((movie, index) => {
            // Determine dynamic badge colors matching user specification strings
            let badgeClass = "priority-classN"; 
            
            if (movie.priority.includes("IMAX Paragon") || movie.priority.includes("Class S")) {
                badgeClass = "priority-classS";
            } else if (movie.priority.includes("Level 10")) {
                badgeClass = "priority-level10";
            } else if (movie.priority.includes("Level 5")) {
                badgeClass = "priority-level5";
            } else if (movie.priority.includes("Streaming") || movie.priority.includes("Class O")) {
                badgeClass = "priority-classO";
            }

            const rowHTML = `
                <div class="movie-item">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-date">${formatDate(movie.date)}</div>
                    <div><span class="status-badge ${badgeClass}">${movie.priority}</span></div>
                    <div class="action-cell">
                        <button class="delete-btn" onclick="deleteMovie(${index})">&times;</button>
                    </div>
                </div>
            `;
            displayContainer.innerHTML += rowHTML;
        });
    }

    function addMovie() {
        const titleInput = document.getElementById("movieTitle");
        const dateInput = document.getElementById("movieDate");
        const priorityInput = document.getElementById("moviePriority");

        if (!titleInput.value || !dateInput.value) {
            alert("Error: Missing target metrics. Fill in movie name and date to assemble.");
            return;
        }

        const newMovie = {
            title: titleInput.value.trim(),
            date: dateInput.value,
            priority: priorityInput.value
        };

        watchlist.push(newMovie);
        saveToMemory();
        renderTimeline();

        titleInput.value = "";
        dateInput.value = "";
    }

    function deleteMovie(index) {
        watchlist.splice(index, 1);
        saveToMemory();
        renderTimeline();
    }

    // Initialize layout setup on boot
    renderTimeline();
</script>

</body>
</html>
